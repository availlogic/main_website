# This context ensures these build settings ONLY apply to your new branch
[context.new_design]
  # The command to compile the code
  command = "pnpm install --prefer-offline && rm -rf node_modules/.vite-temp && tsc -b && BUILD_MODE=prod vite build"
  
  # The directory containing the compiled assets (usually 'dist' or 'build')
  publish = "dist"